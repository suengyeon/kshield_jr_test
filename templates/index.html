{% extends "base.html" %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">파일 업로드</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('upload') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input class="form-control" type="file" name="file" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Upload</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">파일 목록</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>파일명</th>
                            <th>업로드한 사용자</th>
                            <th class="text-end">크기 (B)</th>
                            <th>업로드 날짜 (UTC)</th>
                            <th>동작</th>
                        </tr>
                        </thead>
                        <tbody>
                        {% for f in files %}
                        <tr>
                            <td>{{ f["original_name"] }}</td>
                            <td>{{ f["uploaded_by"] }}</td>
                            <td class="text-end">{{ f["size_bytes"] }}</td>
                            <td>{{ f["uploaded_at"] }}</td>
                            <td>
                                <a class="btn btn-sm btn-outline-primary" href="{{ url_for('download', id=f['id']) }}">Download</a>
                                <form method="post" action="{{ url_for('delete') }}" class="d-inline">
                                    <input type="hidden" name="id" value="{{ f['id'] }}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">업로드된 파일이 없습니다.</td>
                        </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
