{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">회원가입</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">아이디</label>
                        <input id="username" name="username" class="form-control" placeholder="3글자 이상" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">비밀번호</label>
                        <input id="password" name="password" type="password" class="form-control" placeholder="6글자 이상" required>
                    </div>
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">비밀번호 확인</label>
                        <input id="password_confirm" name="password_confirm" type="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-0">이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
